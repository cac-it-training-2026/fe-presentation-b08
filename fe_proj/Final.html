<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>DBの正規化 課題一覧</title>

  <style>
    body {
		font-family: sans-serif;
		  margin: 0;
		  background: #eef2f7;
		  height: 100vh;
		  display: flex;
		  justify-content: center;
		  align-items: center;
    }

    .menu-container {
      width: 100%;
      max-width: 600px;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #555;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <div class="menu-container">
    <h1>最終結果</h1>
    <p id="result" class="score"></p>

  </div>

</body>
</html>


<script>
let score = localStorage.getItem("score");

document.getElementById("result").textContent =
  score + "問正解！";
</script>
