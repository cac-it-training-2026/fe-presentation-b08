<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>DBの正規化 4択問題</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="quiz-container">
			
			
			
            <h3 class="quiz-question">問題2: 次のうち、第1正規形（1NF）の説明として正しいものはどれか？</h3>
 
 
            <form class="quiz-options" >
                <label>
                    <input type="radio" name="q1" value="1" /> 1. 主キー以外の属性は主キーに完全関数従属している必要がある
                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> 2. 繰り返し項目や配列を持たないようにし、すべてを単一値にする
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> 3. 推移的関数従属を排除する
                </label>
                <label>
                    <input type="radio" name="q1" value="4" /> 4. 主キーを複数持つことを禁止する
                </label>
            </form>

            <details class="quiz-answer" id="answer-box">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：2. 繰り返し項目や配列を持たないようにし、すべてを単一値にする</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                       第1正規形は「列の中は1つの値だけ（原子値）」というルール。配列や繰り返しグループを排除するのがポイント。
                    </p>
                     <a href="question03.html" class="btn" button onclick="next()">次の問題へ</a>
                </div>
            </details>
        </div>
    </body>
</html>

<script>
function next() {
	
  // 選択されたものを取得
  let selected = document.querySelector('input[name="q1"]:checked');

  if (!selected) {
    alert("選択してください");
    return;
  }

  // 今のスコア取得
  let score = Number(localStorage.getItem("score")) || 0;

  // 正解なら加算（value=1を正解にしてる）
  if (selected.value === "2") {
    score++;
  }
  
  localStorage.setItem("score", score);

}

const answerBox = document.getElementById("answer-box");
const radios = document.querySelectorAll('input[name="q1"]');


answerBox.querySelector("summary").addEventListener("click", function (e) {

  const checked = document.querySelector('input[name="q1"]:checked');

  if (!checked) {
    e.preventDefault(); // ← detailsが開くのを止める
    alert("先に選択肢を選んでください！");
  }

});
</script>
