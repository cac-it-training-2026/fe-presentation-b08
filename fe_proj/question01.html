<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>DBの正規化 4択問題</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
		
        <div class="quiz-container">
            <h3 class="quiz-question">問題1:次のうち、第2正規化(2NF)の説明として正しいものはどれか</h3>

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" /> 1. 1つのセルに複数の値を持たせないようにすること
                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> 2. 主キーの一部だけに依存する列を分離し、部分関数従属をなくすこと
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> 3. 主キー以外の列同士の依存関係をなくすこと
                </label>
                <label>
                    <input type="radio" name="q1" value="4" /> 4. データをすべて1つのテーブルにまとめること
                </label>
            </form>

            <details class="quiz-answer" id="answer-box">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：2. 主キーの一部だけに依存する列を分離し、部分関数従属をなくすこと</strong>
                    </p>
                    <div class="explanation">
                        <strong>解説：</strong><br/>
                        第2正規化とは第1正規化された表から、部分関数従属している列が切り出されたものです。<br/>
                        部分関数従属とは、複合主キーの一部だけで他の項目が決まってしまう関係のことです。<br/>
                        
                        <a href="question02.html" class="btn" button onclick="next()">次の問題へ</a>
                    </p>
                </div>
            </details>
        </div>
        
        
    </body>
</html>

<script>
localStorage.setItem("score", 0);
</script>


<script>
function next() {
	
  // 選択されたものを取得
  let selected = document.querySelector('input[name="q1"]:checked');

  if (!selected) {
    alert("選択してください");
    return;
  }

  // 今のスコア取得
  let score = Number(localStorage.getItem("score")) || 0;

  // 正解なら加算（value=1を正解にしてる）
  if (selected.value === "2") {
    score++;
  }
  
  localStorage.setItem("score", score);

}


const answerBox = document.getElementById("answer-box");
const radios = document.querySelectorAll('input[name="q1"]');


answerBox.querySelector("summary").addEventListener("click", function (e) {

  const checked = document.querySelector('input[name="q1"]:checked');

  if (!checked) {
    e.preventDefault(); // ← detailsが開くのを止める
    alert("先に選択肢を選んでください！");
  }

});

</script>
